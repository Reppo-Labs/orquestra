<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Orquestra</title>
<style>
  body { font: 14px/1.5 system-ui, sans-serif; margin: 0; background: #0b0e14; color: #d7dce5; }
  header { padding: 16px 24px; border-bottom: 1px solid #1c2230; display: flex; justify-content: space-between; align-items: baseline; }
  h1 { font-size: 18px; margin: 0; } .muted { color: #7d8799; font-size: 12px; }
  main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: #121620; border: 1px solid #1c2230; border-radius: 8px; padding: 14px; }
  .card .k { color: #7d8799; font-size: 12px; } .card .v { font-size: 20px; font-weight: 600; margin-top: 4px; }
  .pos { color: #5ad19b; } .neg { color: #e5707e; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #1c2230; font-variant-numeric: tabular-nums; }
  th { color: #7d8799; font-weight: 500; font-size: 12px; }
  .pill { padding: 1px 8px; border-radius: 999px; font-size: 11px; }
  .up { background: #163a2b; color: #5ad19b; } .down { background: #3a1620; color: #e5707e; }
  .mint { background: #1c2a3a; color: #6fb3e8; } .claim { background: #2a2440; color: #b39ae5; }
  .vote { background: #1c2230; color: #9aa7bd; }
  .err { color: #e5707e; } select { background: #121620; color: #d7dce5; border: 1px solid #1c2230; border-radius: 6px; padding: 4px; }
  .bar { background: #1c2230; border-radius: 4px; height: 8px; overflow: hidden; margin-top: 6px; }
  .bar > div { background: #6fb3e8; height: 100%; } .bar.hot > div { background: #e5707e; }
  .skipreason { color: #c9a86a; font-size: 12px; }
  a { color: #6fb3e8; }
</style>
</head>
<body>
<header>
  <h1>Orquestra <span class="muted" id="sub"></span></h1>
  <span class="muted" id="asof"></span>
</header>
<main>
  <div id="earnBanner" class="muted" style="margin-bottom:16px"></div>
  <div class="cards" id="cards"></div>
  <h2 style="font-size:15px">Cycle health</h2>
  <table id="healthTable"><thead><tr><th>Datanet</th><th>Votes ✓/⊘/✗</th><th>Mints ✓/⊘/✗</th><th>Skips</th><th>Top error</th></tr></thead><tbody></tbody></table>
  <div id="idle" style="margin-bottom:24px"></div>
  <h2 style="font-size:15px">Budget burn</h2>
  <div class="cards" id="budget"></div>
  <h2 style="font-size:15px">Claimable emissions</h2>
  <table id="emTable"><thead><tr><th>Pod</th><th>Datanet</th><th>Epoch</th><th>REPPO</th></tr></thead><tbody></tbody></table>
  <h2 style="font-size:15px">Activity
    <select id="kind"><option value="">all</option><option>vote</option><option>mint</option><option>claim</option><option>skip</option></select>
  </h2>
  <table id="actTable"><thead><tr><th>Time</th><th>Kind</th><th>Datanet</th><th>Pod</th><th>Detail</th><th>Status</th><th>Tx</th></tr></thead><tbody></tbody></table>
</main>
<script>
const fmt = (n) => (n === undefined || n === null) ? '—' : (Math.round(n * 10000) / 10000).toLocaleString()
const sign = (n) => n > 0 ? 'pos' : n < 0 ? 'neg' : ''
async function load() {
  const [pnlRes, act, cfg, earn, health] = await Promise.all([
    fetch('/api/pnl').then(r => r.json()),
    fetch('/api/activity').then(r => r.json()),
    fetch('/api/config').then(r => r.json()),
    fetch('/api/earn').then(r => r.json()).catch(() => null),
    fetch('/api/health').then(r => r.json()).catch(() => null),
  ])
  const p = pnlRes.pnl, snap = pnlRes.snapshot
  document.getElementById('earnBanner').textContent = earn
    ? `Earn-test: ${earn.earning ? 'EARNING' : (earn.totalUpVotes > 0 ? 'accruing upvotes (emissions lag)' : 'no signal yet')} · ${earn.mintedPods} pod(s), ${fmt(earn.claimableReppo)} claimable + ${fmt(earn.claimedReppo)} claimed REPPO, ${earn.totalUpVotes}↑/${earn.totalDownVotes}↓`
    : 'Earn-test: pending first cycle'
  document.getElementById('sub').textContent = `· ${cfg.cadenceHours}h cadence · claim ${cfg.claimEmissions ? 'on' : 'off'}`
  document.getElementById('asof').textContent = snap ? `as of ${new Date(snap.ts).toLocaleString()}` : 'PnL pending first cycle'
  const epochLabel = (e) => e ? `${e.epoch} · ${Math.max(0, Math.round(e.secondsRemaining / 3600))}h left` : '—'
  const cards = [
    ['Epoch', snap ? epochLabel(snap.epoch) : '—'],
    ['Net REPPO', p ? `<span class="${sign(p.netReppo)}">${fmt(p.netReppo)}</span>` : '—'],
    ['Earned', p ? fmt(p.earnedReppo) : '—'], ['Claimed', p ? fmt(p.claimedReppo) : '—'],
    ['Claimable', p ? fmt(p.claimableReppo) : '—'], ['Spent (mint)', p ? fmt(p.spentReppo) : '—'],
    ['Gas (ETH)', p ? fmt(p.gasSpentEth) : '—'],
    ['REPPO bal', snap ? fmt(snap.balance.reppo) : '—'], ['veREPPO', snap ? fmt(snap.balance.veReppo) : '—'],
  ]
  document.getElementById('cards').innerHTML = cards.map(([k, v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('')
  // Cycle health: per-datanet outcome counts + dominant error code
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]))
  const hRows = (health?.datanets ?? [])
  const kc = (c) => `${c.executed}/${c.refused}/${c.error}`
  document.querySelector('#healthTable tbody').innerHTML = hRows.length
    ? hRows.map(d => `<tr><td>${esc(d.datanetId)}</td><td>${kc(d.votes)}</td><td>${kc(d.mints)}</td><td>${d.skips || ''}</td><td class="err">${d.topErrors[0] ? `${esc(d.topErrors[0].code)} × ${d.topErrors[0].count}` : ''}</td></tr>`).join('')
    : '<tr><td colspan="5" class="muted">no activity yet</td></tr>'
  // Idle datanets: why a configured datanet is doing nothing RIGHT NOW (newest entry
  // is a skip) — a stale skip reason from before activity resumed must not show.
  const idle = hRows.filter(d => d.idle && d.lastSkipReason)
  document.getElementById('idle').innerHTML = idle
    .map(d => `<div class="skipreason">datanet ${esc(d.datanetId)} idle — ${esc(d.lastSkipReason)}</div>`).join('')
  // Budget burn vs caps (current window, from the cycle snapshot)
  const b = snap?.budget, caps = b?.caps
  const bars = b ? [
    ['Vote gas (ETH)', b.voteGasSpentEth, caps.voteGasEthMax],
    ['Mint REPPO', b.mintReppoSpent, caps.mintReppoMax],
    ['Mint gas (ETH)', b.mintGasSpentEth, caps.mintGasEthMax],
    ['Claim gas (ETH)', b.claimGasSpentEth, caps.claimGasEthMax],
    // grantReppoMax unset = no cap (datanet membership is the consent) → show ∞
    ['Grant REPPO', b.grantReppoSpent ?? 0, caps.grantReppoMax],
  ] : []
  document.getElementById('budget').innerHTML = bars.map(([k, spent, max]) => {
    const pct = max > 0 ? Math.min(100, Math.round(100 * spent / max)) : 0
    const maxLabel = (max === undefined || max === null) ? '∞' : fmt(max)
    return `<div class="card"><div class="k">${k}</div><div class="v">${fmt(spent)} / ${maxLabel}</div><div class="bar ${pct >= 80 ? 'hot' : ''}"><div style="width:${pct}%"></div></div></div>`
  }).join('')
  const em = snap ? snap.emissionsDue.pods : []
  document.querySelector('#emTable tbody').innerHTML = em.length
    ? em.map(e => `<tr><td>${e.podId}</td><td>${e.datanetId}</td><td>${e.epoch}</td><td>${fmt(e.reppo)}</td></tr>`).join('')
    : '<tr><td colspan="4" class="muted">none — all claimed</td></tr>'
  window._activity = act
  renderActivity()
}
function renderActivity() {
  // every field below is network-derived (LLM reasons, pod names, CLI errors) —
  // ALL of it goes through esc() before innerHTML. pill class + tx href are
  // allowlisted by shape instead (CSS class / URL context, escaping isn't enough).
  const esc2 = (s) => String(s ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]))
  const kind = document.getElementById('kind').value
  const rows = (window._activity || []).filter(r => !kind || r.kind === kind)
  const detail = (r) => r.kind === 'vote'
      ? (r.direction ? `${esc2(r.direction)} · conv ${esc2(r.conviction)} · ${esc2(r.reason ?? '')}` : esc2(r.detail || '—'))
    : r.kind === 'mint' ? esc2(r.podName ?? r.canonicalKey ?? '')
    : r.kind === 'skip' ? esc2(r.reason ?? '—')
    : `epoch ${esc2(r.epoch)} · ${fmt(r.reppoClaimed)} REPPO`
  const tx = (r) => /^0x[0-9a-fA-F]{1,64}$/.test(r.txHash ?? '') ? `<a href="https://basescan.org/tx/${r.txHash}" target="_blank">${r.txHash.slice(0,8)}…</a>` : ''
  const pillClass = (r) => r.kind === 'vote' ? (r.direction === 'up' || r.direction === 'down' ? r.direction : 'vote') : r.kind
  document.querySelector('#actTable tbody').innerHTML = rows.length
    ? rows.map(r => `<tr><td>${new Date(r.ts).toLocaleTimeString()}</td><td><span class="pill ${esc2(pillClass(r))}">${esc2(r.kind)}</span></td><td>${esc2(r.datanetId)}</td><td>${esc2(r.podId ?? r.canonicalKey ?? '')}</td><td>${detail(r)}</td><td class="${r.status === 'executed' ? '' : 'err'}">${esc2(r.status)}</td><td>${tx(r)}</td></tr>`).join('')
    : '<tr><td colspan="7" class="muted">no activity yet</td></tr>'
}
document.getElementById('kind').addEventListener('change', renderActivity)
load().catch(e => document.getElementById('asof').textContent = 'load error: ' + e.message)
setInterval(load, 30000)
</script>
</body>
</html>
