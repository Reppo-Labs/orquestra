name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # The dashboard SPA is a separate package; its unit tests (configDiff, loadAll
      # resilience) are not reached by the root vitest config. Run them too —
      # config-diff feeds what an operator saves as budget/strategy.
      - run: npm --prefix web ci
      - run: npm --prefix web run test
      - run: npm run build
