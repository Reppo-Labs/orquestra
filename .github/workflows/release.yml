name: release

# Build and publish the Orquestra node image to GHCR on a version tag.
# Operators pull ghcr.io/reppo-labs/orquestra:<version> (see ADR 0001).
on:
  push:
    tags:
      - 'v*'

jobs:
  # Gate the publish: a tag cut from a commit that typechecks/builds but fails tests
  # must NOT ship to operators who pull :latest against their funded wallet. The
  # Dockerfile build only compiles, it never runs the suite — so run it here.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm --prefix web ci
      - run: npm --prefix web run test

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags from the git tag: vX.Y.Z -> X.Y.Z + latest. The image name is
      # lowercased (GHCR requires it; the org is "Reppo-Labs").
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/reppo-labs/orquestra
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
