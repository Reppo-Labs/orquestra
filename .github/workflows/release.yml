name: release

# Build and publish the Orquestra node image to GHCR on a version tag.
# Operators pull ghcr.io/reppo-labs/orquestra:<version> (see ADR 0001).
on:
  push:
    tags:
      - 'v*'

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags from the git tag: vX.Y.Z -> X.Y.Z + latest. The image name is
      # lowercased (GHCR requires it; the org is "Reppo-Labs").
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/reppo-labs/orquestra
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
